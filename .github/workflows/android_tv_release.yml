name: Android TV Release

on:
  push:
    branches: [ "main" ]
    paths:
      - 'jiotvplus_android/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x jiotvplus_android/gradlew || true

    - name: Build Debug APK
      run: |
        cd jiotvplus_android
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          gradle wrapper --gradle-version 8.6 || true
        fi
        ./gradlew assembleDebug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jiotvplus-android-tv-debug
        path: jiotvplus_android/app/build/outputs/apk/debug/*.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: jiotvplus_android/app/build/outputs/apk/debug/*.apk
        tag_name: "v1.${{ github.run_number }}"
        name: "Release v1.${{ github.run_number }}"
        draft: false
        prerelease: false
        generate_release_notes: true
